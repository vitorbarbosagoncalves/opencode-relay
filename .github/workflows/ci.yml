name: CI

on:
  push:
    branches-ignore:
      - release
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint & format
        run: npx biome ci .

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Audit
        run: npm audit --audit-level=high
